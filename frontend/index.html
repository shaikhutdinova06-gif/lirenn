<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЛИРЕН</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
</head>

<body>

<header>
    <div class="logo">
        <div class="logo-icon">🌱</div>
        <div>
            <h1>Лирен</h1>
            <p>Анализ и восстановление почвы</p>
        </div>
    </div>
</header>

<input type="file" id="file">
<input id="lat" placeholder="lat" value="55.7558">
<input id="lon" placeholder="lon" value="37.6173">

<select id="analysisType">
    <option value="photo">📷 Анализ по фото</option>
    <option value="visual">👁️ Визуальный анализ</option>
    <option value="chemical">🧪 Химический анализ</option>
</select>

<button onclick="send()">📷 Анализ</button>
<button onclick="getLocation()">📍 Найти мой участок</button>
<button onclick="setTestLocation()">🧪 Тестовое местоположение</button>
<button onclick="savePointOnMap()">💾 Сохранить точку</button>
<button onclick="showUserZones()">⭕ Зоны загрязнения</button>
<button onclick="recovery()">🔄 Восстановление</button>
<button onclick="simulateHistory()">📊 История</button>
<button onclick="showSoilProfile()">🌱 Почвенный профиль</button>

<div id="out"></div>

<div id="liren-help"></div>

<div id="map" style="height:400px;"></div>
<div id="plot3d" style="height:400px;"></div>
<div id="soil3d" style="height:400px;"></div>

<div id="controls">
    <button id="addPointBtn" class="btn-primary">➕ Добавить точку</button>
    <button id="refreshPoints" class="btn-secondary">🔄 Обновить точки</button>
</div>

<div id="point-form" class="hidden">
    <div class="form-container">
        <h3>Новая точка</h3>
        <input type="text" id="pointTitle" placeholder="Название точки" required>
        <textarea id="pointDescription" placeholder="Описание" rows="3"></textarea>
        <input type="file" id="pointPhoto" accept="image/*">
        <div class="form-buttons">
            <button id="savePoint" class="btn-primary">💾 Сохранить</button>
            <button id="cancelPoint" class="btn-secondary">❌ Отмена</button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
