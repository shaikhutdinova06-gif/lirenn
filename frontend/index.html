<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIREN</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
input, button { margin: 5px; padding: 8px; }
button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
button:hover { background-color: #45a049; }
#out { background: #f5f5f5; padding: 10px; border-radius: 5px; }
#map { margin-top: 20px; border: 1px solid #ccc; }
</style>
</head>
<body>

<h2>LIREN 🌱</h2>

<input type="file" id="file" accept="image/*"><br>
<label>Latitude: <input id="lat" type="number" step="0.000001" placeholder="55.7558"></label><br>
<label>Longitude: <input id="lon" type="number" step="0.000001" placeholder="37.6173"></label><br>

<button onclick="send()">анализ</button>
<a href="report.html" style="display:inline-block; margin-left:10px;">Смотреть отчет ИИ</a>

<pre id="out"></pre>

<div id="map" style="height:300px;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
