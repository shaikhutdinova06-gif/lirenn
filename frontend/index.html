<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЛИРЕН — Анализ почвы</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
<div class="container">
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🌱</div>
            <div>
                <h1>Лирен</h1>
                <p>Экологический анализ почвы</p>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="panel">
            <div class="panel-header">
                <h2>📍 Параметры точки</h2>
            </div>
            <div class="panel-body">
                <div class="input-group">
                    <label>Фото почвы (опционально)</label>
                    <input type="file" id="image" accept="image/*">
                </div>
                <div class="input-group">
                    <label>Широта (lat)</label>
                    <input type="number" id="lat" step="0.000001" value="55.7558" placeholder="55.7558">
                </div>
                <div class="input-group">
                    <label>Долгота (lng)</label>
                    <input type="number" id="lng" step="0.000001" value="37.6173" placeholder="37.6173">
                </div>
                <div class="input-group">
                    <label>pH почвы</label>
                    <input type="number" id="ph" step="0.1" min="0" max="14" placeholder="7.0">
                </div>
                <div class="input-group">
                    <label>Влажность (%)</label>
                    <input type="number" id="moisture" step="1" min="0" max="100" placeholder="50">
                </div>
                <div class="input-group">
                    <label>Цвет метки</label>
                    <select id="color">
                        <option value="green">🟢 Зелёный (норма)</option>
                        <option value="yellow">🟡 Жёлтый (внимание)</option>
                        <option value="red">🔴 Красный (аномалия)</option>
                        <option value="blue">🔵 Синий (интерес)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Иконка</label>
                    <select id="icon">
                        <option value="sample">🧪 Образец взят</option>
                        <option value="analysis">📊 Требует анализа</option>
                        <option value="interest">⭐ Особый интерес</option>
                        <option value="control">🎯 Контрольная точка</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Теги (через запятую)</label>
                    <input type="text" id="tags" placeholder="#чернозём, #суглинок">
                </div>
                <div class="input-group">
                    <label>Заметки</label>
                    <textarea id="notes" rows="3" placeholder="Описание точки..."></textarea>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="goToLocation()">📍 Найти участок</button>
                    <button class="btn btn-secondary" onclick="getMyLocation()">🧭 Моё местоположение</button>
                    <button class="btn btn-secondary" onclick="loadTestLocation()">🧪 Тестовое местоположение</button>
                    <button class="btn btn-success" onclick="addPoint()">💾 Сохранить точку</button>
                </div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>
    </main>
</div>

<script src="/static/script.js"></script>
</body>
</html>
