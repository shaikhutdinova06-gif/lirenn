<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LIREN</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>

<body>

<h1>LIREN 🌱</h1>

<input type="file" id="file">
<input id="lat" placeholder="lat" value="55.7558">
<input id="lon" placeholder="lon" value="37.6173">

<button onclick="send()">Анализ</button>
<button onclick="load3D()">3D карта</button>
<button onclick="loadDegradation()">Деградация</button>
<button onclick="loadRecovery('chernozem', 0.7)">Восстановление</button>
<button onclick="loadUserPoints()">Мой участок 3D</button>
<button onclick="showUserZones()">Зоны загрязнения</button>

<div id="out"></div>

<div id="map" style="height:400px;"></div>
<div id="plot3d" style="height:400px;"></div>

<script src="/static/script.js"></script>
</body>
</html>
