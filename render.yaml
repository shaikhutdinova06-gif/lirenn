services:
  - type: web
    name: liren-map-backend
    env: node
    plan: free
    rootDir: liren-map-v2/backend
    buildCommand: npm install --force
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liren-map-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: liren-map-db
    plan: free
    databaseName: liren
