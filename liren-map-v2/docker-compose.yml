version: "3.8"

services:
  api:
    build: ./backend
    container_name: liren-map-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/liren
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgis/postgis:15-3.3
    container_name: liren-map-db
    environment:
      POSTGRES_DB: liren
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
